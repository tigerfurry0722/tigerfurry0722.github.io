<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小虎的畫師日誌 v1.5.4</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        :root { --gold: #fab005; --dark: #333; --blue: #4dabf7; }
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; }
        .nav-bar { background: var(--dark); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .page { display: none; }
        .active-page { display: block; }

        .auth-card { border: 1px solid #eee; padding: 25px; border-radius: 15px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        
        /* 隱藏式蜜罐陷阱 (Honeypot) - 機器人會手癢去填，填了就報錯 */
        .hp-field { display: none !important; }

        .btn-guest { background: var(--blue); color: white; width: 100%; padding: 15px; font-size: 16px; }
        .switch-link { margin-top: 25px; font-size: 13px; color: #bbb; cursor: pointer; }
        
        .post-card { border-bottom: 1px solid #eee; padding: 20px 0; }
        #admin-editor { display: none; background: #fff9db; padding: 20px; border-radius: 12px; border: 2px solid var(--gold); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="nav-bar">
    <strong style="cursor:pointer;" onclick="showPage('home')">🐯 小虎日誌</strong>
    <div style="cursor:pointer;" onclick="showPage('login')">👤</div>
</div>

<div class="container">
    <div id="page-home" class="page active-page">
        <div id="admin-editor">
            <h3 style="margin-top:0;">📝 新增日誌</h3>
            <textarea id="post-text" style="width:100%; height:100px; padding:10px; border-radius:8px; border:1px solid #ddd;"></textarea>
            <button onclick="uploadPost()" style="background:#2ed573; color:white; width:100%; padding:10px; margin-top:10px;">發布文章</button>
        </div>
        <div id="feed">載入日誌中...</div>
    </div>

    <div id="page-login" class="page">
        <div id="view-guest" class="auth-card">
            <h2>🐾 訪客快速驗證</h2>
            <p style="color:#666; margin-bottom: 20px;">點擊下方按鈕即可自動完成安全檢查。</p>
            
            <button id='guest-submit' class="btn-guest g-recaptcha" 
                    data-sitekey="你的_reCAPTCHA_SITE_KEY" 
                    data-callback='onGuestVerified' 
                    data-badge="bottomright">
                🚀 開啟互動功能
            </button>
            
            <p class="switch-link" onclick="toggleView('admin')">不是遊客嗎？管理員登入</p>
        </div>

        <div id="view-admin" class="auth-card" style="display:none;">
            <h2>🔑 管理員後台</h2>
            <input type="email" id="adm-email" placeholder="Email">
            <input type="password" id="adm-pw" placeholder="Password">
            
            <input type="text" id="honeypot" class="hp-field" placeholder="Don't fill this">

            <button style="background:var(--gold); color:white; width:100%; padding:12px;" onclick="admLogin()">登入權限</button>
            <p class="switch-link" onclick="toggleView('guest')">返回訪客驗證</p>
        </div>

        <div id="status-box" style="display:none; text-align:center; padding:20px;">
            <p id="user-info"></p>
            <button onclick="doSignOut()" style="background:#ff4757; color:white; padding:10px 20px;">登出</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBK3gZ-lkSPgKGcIs6eQRa-mz2ffl8Os1k",
        authDomain: "blog-f2a36.firebaseapp.com",
        databaseURL: "https://blog-f2a36-default-rtdb.firebaseio.com/",
        projectId: "blog-f2a36",
        storageBucket: "blog-f2a36.appspot.com",
        messagingSenderId: "857805164808",
        appId: "1:857805164808:web:7563148f9368d374f368d3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const ADMIN_MAIL = "hehans1108@gmail.com";

    window.showPage = (p) => {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active-page'));
        document.getElementById(`page-${p}`).classList.add('active-page');
    };
    window.toggleView = (type) => {
        document.getElementById('view-guest').style.display = (type === 'guest') ? 'block' : 'none';
        document.getElementById('view-admin').style.display = (type === 'admin') ? 'block' : 'none';
    };

    // 🏆 隱形驗證回調函數
    window.onGuestVerified = (token) => {
        signInAnonymously(auth).then(() => {
            alert("安全檢查通過！🐯");
            showPage('home');
        });
    };

    window.admLogin = () => {
        // 🏆 蜜罐檢查：如果這格有值，代表是機器人填的
        if(document.getElementById('honeypot').value) return; 

        const e = document.getElementById('adm-email').value;
        const p = document.getElementById('adm-pw').value;
        signInWithEmailAndPassword(auth, e, p).then(() => showPage('home')).catch(err => alert("失敗：" + err.message));
    };

    window.doSignOut = () => signOut(auth).then(() => location.reload());

    window.uploadPost = () => {
        const val = document.getElementById('post-text').value;
        if(val) push(ref(db, 'posts'), { text: val, time: new Date().toLocaleString() }).then(() => document.getElementById('post-text').value = "");
    };

    onAuthStateChanged(auth, (user) => {
        const isAdmin = user && user.email === ADMIN_MAIL;
        document.getElementById('admin-editor').style.display = isAdmin ? 'block' : 'none';
        if(user) {
            document.getElementById('view-guest').style.display = 'none';
            document.getElementById('view-admin').style.display = 'none';
            document.getElementById('status-box').style.display = 'block';
            document.getElementById('user-info').innerText = `目前身分：${isAdmin ? "站長小虎" : "驗證訪客"}`;
        }
    });

    onValue(ref(db, 'posts'), (snap) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        const data = snap.val();
        if(data) {
            Object.keys(data).reverse().forEach(id => {
                const p = data[id];
                feed.innerHTML += `<div class="post-card"><small>📅 ${p.time}</small><p style="font-size:17px;">${p.text}</p></div>`;
            });
        }
    });
</script>
</body>
</html>
