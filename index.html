<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Forbidden - 系統安全檢查</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .loading-dot {
            animation: pulse 1.5s infinite;
        }
        .login-modal {
            backdrop-filter: blur(4px);
        }
        /* 旋轉動畫 */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col items-center justify-center min-h-screen p-4 font-sans text-gray-700 relative">

    <!-- 1. 系統正在驗證您的瀏覽器 過場畫面 -->
    <div id="loading-screen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center space-y-4">
        <div class="w-12 h-12 border-4 border-gray-200 border-t-blue-500 rounded-full spinner"></div>
        <div class="text-center">
            <h2 class="text-xl font-bold text-gray-800">系統正在驗證您的瀏覽器</h2>
            <p class="text-gray-400 text-sm mt-2">請耐心等候一下，這可能需要幾秒鐘...</p>
        </div>
        <p class="text-[10px] text-gray-300 font-mono absolute bottom-10 tracking-widest uppercase">Security Layer v4.0.12</p>
    </div>

    <!-- 2. 攔截主畫面 -->
    <div id="block-screen" class="hidden max-w-md w-full bg-white shadow-2xl rounded-2xl p-8 border border-gray-100 text-center">
        <div class="flex justify-center mb-8">
            <div class="bg-red-50 p-5 rounded-full ring-8 ring-red-50/50">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
            </div>
        </div>

        <h1 class="text-2xl font-bold text-gray-800 mb-2">發生錯誤</h1>
        <div class="h-1.5 w-16 bg-red-500 mx-auto rounded-full mb-8"></div>

        <div class="space-y-6 text-left">
            <p class="text-lg text-gray-600 font-medium text-center leading-relaxed">
                **很抱歉，因無法驗證您不是機器人，您的請求已被攔截。**
            </p>
            
            <div class="bg-gray-50 border-l-4 border-red-500 p-4 rounded-r-lg">
                <p class="text-xs text-gray-500 font-mono leading-loose">
                    [系統報告]<br>
                    狀態碼: 403 Forbidden<br>
                    原因: 非人類行為檢測異常 (Bot_Detection_v4)<br>
                    **您的 IP 地址已記錄在案。**
                </p>
            </div>

            <div class="text-center mt-8">
                <p class="text-xs text-gray-400 mb-2 font-semibold uppercase tracking-widest">申訴與支援</p>
                <a href="mailto:hehans1108perdonal@proton.me" class="text-blue-500 hover:text-blue-700 font-mono text-sm underline decoration-2 underline-offset-4">
                    hehans1108perdonal@proton.me
                </a>
            </div>
        </div>

        <!-- 管理員繞過驗證按鈕 -->
        <div class="mt-10 pt-6 border-t border-gray-100">
            <button onclick="toggleLoginModal()" class="text-[10px] text-gray-300 hover:text-blue-400 transition-all uppercase tracking-widest">
                使用支援郵件提供的帳號密碼來繞過驗證
            </button>
        </div>
    </div>

    <!-- 3. 登入成功後的主畫面 -->
    <div id="admin-screen" class="hidden max-w-4xl w-full bg-white shadow-xl rounded-2xl p-12 border border-gray-100">
        <div class="flex items-center justify-between mb-8 border-b pb-4">
            <h2 class="text-2xl font-bold text-gray-800">管理後台</h2>
            <button onclick="handleLogout()" class="bg-red-50 text-red-500 px-4 py-1 rounded-full text-xs font-bold hover:bg-red-100 transition-colors">登出系統</button>
        </div>
        <div class="flex flex-col items-center justify-center py-20 border-2 border-dashed border-gray-100 rounded-xl">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-gray-200 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
            <p class="text-gray-400 font-medium italic">**暫無貼文**</p>
        </div>
    </div>

    <!-- 4. 登入 Modal -->
    <div id="login-modal" class="hidden fixed inset-0 login-modal bg-black/50 flex items-center justify-center p-4 z-[110]">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl scale-up-animation">
            <h3 class="text-lg font-bold mb-4 text-center text-gray-800 tracking-tight">管理員認證</h3>
            <form onsubmit="event.preventDefault(); handleLogin();" class="space-y-4">
                <input type="email" id="email" autocomplete="email" placeholder="電子郵件" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <input type="password" id="password" autocomplete="current-password" placeholder="密碼" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <button type="submit" id="login-submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all active:scale-95">
                    認證並繞過
                </button>
                <button type="button" onclick="toggleLoginModal()" class="w-full text-gray-400 text-xs py-2 hover:text-gray-600 transition-colors">關閉視窗</button>
            </form>
            <p id="login-error" class="text-red-500 text-xs mt-3 text-center hidden"></p>
        </div>
    </div>

    <script>
        // --- Firebase 設定區 ---
        const firebaseConfig = {
            apiKey: "", 
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        let auth;

        // 初始化與載入邏輯
        window.onload = function() {
            // 模擬瀏覽器驗證過程
            setTimeout(() => {
                const loadingScreen = document.getElementById('loading-screen');
                loadingScreen.style.opacity = '0';
                setTimeout(() => loadingScreen.style.display = 'none', 500);
                
                // 初始化 Firebase
                initFirebase();
            }, 2500); // 2.5 秒的驗證動畫
        };

        function initFirebase() {
            try {
                if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "") {
                    firebase.initializeApp(firebaseConfig);
                    auth = firebase.auth();
                    
                    auth.onAuthStateChanged((user) => {
                        const blockScreen = document.getElementById('block-screen');
                        const adminScreen = document.getElementById('admin-screen');

                        if (user) {
                            blockScreen.style.display = 'none';
                            adminScreen.classList.remove('hidden');
                        } else {
                            blockScreen.style.display = 'block';
                            adminScreen.classList.add('hidden');
                        }
                    });
                } else {
                    // 若無設定 API Key 則默認顯示攔截畫面
                    document.getElementById('block-screen').style.display = 'block';
                }
            } catch (e) {
                console.error("Firebase 初始化失敗:", e);
                document.getElementById('block-screen').style.display = 'block';
            }
        }

        function toggleLoginModal() {
            const modal = document.getElementById('login-modal');
            modal.classList.toggle('hidden');
            document.getElementById('login-error').classList.add('hidden');
        }

        async function handleLogin() {
            if (!auth) {
                alert("!!請先在代碼中填寫 Firebase Config!! (API Key 等資訊)");
                return;
            }

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorLabel = document.getElementById('login-error');
            const submitBtn = document.getElementById('login-submit');

            if (!email || !password) {
                errorLabel.innerText = "請填寫完整資訊";
                errorLabel.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "正在取得權限...";
            errorLabel.classList.add('hidden');

            try {
                await auth.signInWithEmailAndPassword(email, password);
                toggleLoginModal();
            } catch (error) {
                errorLabel.innerText = "驗證碼無效或權限不足";
                errorLabel.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "認證並繞過";
            }
        }

        function handleLogout() {
            if (auth) {
                auth.signOut().then(() => location.reload());
            }
        }
    </script>
</body>
</html>
