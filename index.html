<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小虎的畫師日誌 v1.4.8</title>
    <style>
        :root { --gold: #fab005; --red: #ff4757; --dark: #333; }
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; }
        .nav-bar { background: var(--dark); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* 隱藏式登入窗 */
        .login-btn { cursor: pointer; font-size: 20px; padding: 4px 8px; border-radius: 50%; transition: 0.3s; }
        .login-btn:hover { background: #444; }
        #login-modal { display: none; position: fixed; top: 60px; right: 20px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1001; width: 260px; border: 1px solid #eee; }
        
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .btn-main { background: var(--dark); color: white; width: 100%; padding: 12px; }
        
        /* 管理員專區 */
        #admin-panel { display: none; background: #fff9db; border: 2px solid var(--gold); padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .admin-tools { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .btn-tool { background: white; border: 1px solid var(--gold); padding: 8px; font-size: 12px; }

        /* 內容顯示控制 */
        #main-content { display: none; }
        #lock-screen { text-align: center; padding: 80px 20px; }
        .maintenance-ui { display: none; text-align: center; color: var(--red); padding: 60px 20px; font-weight: bold; }
        
        .post-card { border-bottom: 1px solid #eee; padding: 20px 0; }
        .post-card:last-child { border-bottom: none; }
        .comment-area { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="nav-bar">
    <strong>🐯 小虎日誌</strong>
    <div class="login-btn" onclick="toggleModal()">👤</div>
</div>

<div id="login-modal">
    <div id="auth-form">
        <h4 style="margin:0 0 10px 0;">身分驗證</h4>
        <input type="email" id="email" placeholder="Email (hehans1108@gmail.com)">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-main" onclick="handleAuth()">登入 / 註冊</button>
    </div>
    <div id="user-status" style="display:none; text-align:center;">
        <p id="current-user" style="font-size:12px; color:#666;"></p>
        <button onclick="logout()" style="background:var(--red); color:white; padding:8px 15px; width:100%;">登出帳號</button>
    </div>
</div>

<div class="container">
    <div id="lock-screen">
        <h2 style="font-size:40px; margin:0;">🔒</h2>
        <h3>內容已鎖定</h3>
        <p style="color:#888;">請點擊右上角頭像登入，即可瀏覽畫師日誌。</p>
    </div>

    <div id="maintenance-ui" class="maintenance-ui">
        🚧 網站整修中，暫停服務 🚧<br>
        <small style="font-weight:normal; color:#999;">管理員小虎正在趕工中...</small>
    </div>

    <div id="admin-panel">
        <h3 style="margin-top:0;">🛠️ 管理員控制台</h3>
        <div class="admin-tools">
            <button class="btn-tool" onclick="updateConfig('maintenance')">🔧 切換維護模式</button>
            <button class="btn-tool" onclick="updateConfig('noComments')">🚫 禁全站留言</button>
        </div>
        <textarea id="new-post" placeholder="今天工作室發生了什麼事？"></textarea>
        <button onclick="publishPost()" style="background:#2ed573; color:white; width:100%; padding:12px;">發布日誌文章</button>
    </div>

    <div id="main-content">
        <div id="post-feed"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, push, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBK3gZ-lkSPgKGcIs6eQRa-mz2ffl8Os1k",
        authDomain: "blog-f2a36.firebaseapp.com",
        databaseURL: "https://blog-f2a36-default-rtdb.firebaseio.com/",
        projectId: "blog-f2a36",
        storageBucket: "blog-f2a36.appspot.com",
        messagingSenderId: "857805164808",
        appId: "1:857805164808:web:7563148f9368d374f368d3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const ADMIN_EMAIL = "hehans1108@gmail.com";

    window.toggleModal = () => {
        const m = document.getElementById('login-modal');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    };

    window.handleAuth = () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        if(!e || !p) { alert("請填寫帳密！"); return; }

        signInWithEmailAndPassword(auth, e, p).catch(err => {
            if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
                return createUserWithEmailAndPassword(auth, e, p);
            }
            alert("登入失敗：" + err.message);
        });
    };

    window.logout = () => signOut(auth).then(() => location.reload());

    window.updateConfig = (key) => {
        const r = ref(db, `config/${key}`);
        get(r).then(s => set(r, !s.val()));
    };

    window.publishPost = () => {
        const txt = document.getElementById('new-post').value;
        if(txt) push(ref(db, 'posts'), { text: txt, time: new Date().toLocaleString() }).then(() => document.getElementById('new-post').value = "");
    };

    onAuthStateChanged(auth, (user) => {
        const isAuth = !!user;
        const isAdmin = user && user.email === ADMIN_EMAIL;
        
        // 介面切換
        document.getElementById('auth-form').style.display = isAuth ? 'none' : 'block';
        document.getElementById('user-status').style.display = isAuth ? 'block' : 'none';
        if(isAuth) {
            document.getElementById('current-user').innerText = "已登入：" + user.email;
            setTimeout(() => document.getElementById('login-modal').style.display = 'none', 1000);
        }

        // 讀取資料庫與配置
        onValue(ref(db), (snap) => {
            const data = snap.val() || {};
            const config = data.config || {};

            // 1. 維護模式判定
            if(config.maintenance && !isAdmin) {
                document.getElementById('maintenance-ui').style.display = 'block';
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'none';
                return;
            }

            // 2. 登入狀態判定
            document.getElementById('maintenance-ui').style.display = 'none';
            document.getElementById('lock-screen').style.display = isAuth ? 'none' : 'block';
            document.getElementById('main-content').style.display = isAuth ? 'block' : 'none';
            document.getElementById('admin-panel').style.display = isAdmin ? 'block' : 'none';

            // 3. 渲染內容
            const feed = document.getElementById('post-feed');
            feed.innerHTML = "";
            if(data.posts) {
                Object.keys(data.posts).reverse().forEach(id => {
                    const p = data.posts[id];
                    feed.innerHTML += `
                        <div class="post-card">
                            <small style="color:#999;">📅 ${p.time}</small>
                            <p style="font-size:17px; margin:10px 0;">${p.text}</p>
                            <div class="comment-area">💬 留言功能載入中...</div>
                        </div>`;
                });
            }
        });
    });
</script>
</body>
</html>
