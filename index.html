<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡️ 雷霆購物網 | THUNDER SHOP</title>
    <style>
        :root {
            --thunder-blue: #00d4ff;
            --thunder-gold: #ffcc00;
            --danger-red: #ff4444;
            --dark-bg: #0d0d0d;
        }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* 頂部導航 */
        nav { background: rgba(0,0,0,0.8); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--thunder-blue); sticky: top; }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--thunder-blue); text-shadow: 0 0 10px var(--thunder-blue); }
        
        /* 商品牆 */
        .container { padding: 20px 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        /* 雷霆卡片設計 */
        .item-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .item-card:hover { transform: translateY(-5px); border-color: var(--thunder-blue); box-shadow: 0 0 15px rgba(0,212,255,0.3); }
        
        .badge-platinum { background: var(--thunder-gold); color: black; font-size: 0.7rem; padding: 2px 8px; border-radius: 5px; font-weight: bold; }
        
        .price { font-size: 1.2rem; color: var(--thunder-blue); margin: 10px 0; }
        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        
        button { 
            padding: 10px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .btn-buy { background: var(--thunder-blue); color: black; }
        .btn-free { background: none; border: 1px solid var(--thunder-blue); color: var(--thunder-blue); }
        .btn-dispute { background: none; color: var(--danger-red); font-size: 0.8rem; text-decoration: underline; }

        /* 登入彈窗 */
        #auth-modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1a1a1a; padding: 30px; border-radius: 15px; width: 300px; text-align: center; border: 1px solid var(--thunder-blue); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<nav>
    <div class="logo">⚡️ THUNDER SHOP</div>
    <div id="user-info">
        <span id="display-balance">餘額: 加載中...</span>
        <button onclick="logout()" style="background:none; color:white; margin-left:10px;">登出</button>
    </div>
</nav>

<!-- 登入模組 -->
<div id="auth-modal" class="hidden">
    <div class="modal-content">
        <h2 style="color:var(--thunder-blue)">雷霆驗證</h2>
        <input type="email" id="email" placeholder="電子郵件" style="width:90%; padding:10px; margin:10px 0;">
        <input type="password" id="password" placeholder="密碼" style="width:90%; padding:10px; margin:10px 0;">
        <button class="btn-buy" id="loginBtn" style="width:100%">登入</button>
        <button class="btn-free" id="regBtn" style="width:100%; margin-top:10px;">註冊</button>
    </div>
</div>

<!-- 商品展示區 -->
<div class="container" id="product-list">
    <!-- 商品會由 JS 動態產生 -->
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, getDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB0RkWH-59lgYef2un0HZlh6Qztb0ARwPQ",
        authDomain: "blog-f2a36.firebaseapp.com",
        projectId: "blog-f2a36",
        storageBucket: "blog-f2a36.firebasestorage.app",
        messagingSenderId: "857809971573",
        appId: "1:857809971573:web:2f56c89ecbe2c8dbdccb3c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 監控登入狀態
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('auth-modal').classList.add('hidden');
            loadUserData(user);
            loadProducts();
        } else {
            document.getElementById('auth-modal').classList.remove('hidden');
        }
    });

    // 載入用戶數據（餘額與檢查封號）
    async function loadUserData(user) {
        const userRef = doc(db, "users", user.uid);
        const snap = await getDoc(userRef);
        if (snap.exists()) {
            const data = snap.data();
            if (data.status === "banned") {
                alert("!!帳號已被雷霆擊毀!!");
                signOut(auth);
                return;
            }
            document.getElementById('display-balance').innerText = `餘額: ${data.balance || 0} RMB`;
        }
    }

    // 載入所有店鋪商品
    async function loadProducts() {
        const listDiv = document.getElementById('product-list');
        listDiv.innerHTML = "⚡️ 雷霆掃描中...";
        
        const querySnapshot = await getDocs(collection(db, "products"));
        listDiv.innerHTML = "";
        
        querySnapshot.forEach((docSnap) => {
            const p = docSnap.data();
            const id = docSnap.id;
            
            // 建立卡片
            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between">
                    <span class="badge-platinum">★ 白金之星級</span>
                    <small style="color:#666">商家: ${p.shopName}</small>
                </div>
                <h3>${p.name}</h3>
                <p style="font-size:0.8rem; color:#ccc">${p.desc}</p>
                <div class="price">¥ ${p.price}</div>
                <div class="btn-group">
                    <button class="btn-buy" onclick="handleBuy('${id}', ${p.price}, '${p.shopId}')">⚡️ 餘額支付</button>
                    <button class="btn-free" onclick="handleRequest('${id}', '${p.shopId}', 'shop')">向商家求免單</button>
                    <button class="btn-free" style="border-color:gold; color:gold;" onclick="handleRequest('${id}', 'admin', 'platform')">向雷霆求免單</button>
                    <button class="btn-dispute" onclick="handleComplaint('${id}')">凍結並投訴此訂單</button>
                </div>
            `;
            listDiv.appendChild(card);
        });
    }

    // 全局掛載函數供按鈕使用
    window.handleBuy = async (pid, price, shopId) => {
        // 這裡會加入「拉黑檢查」與「扣款」
        alert("正在請求雷霆支付系統...");
    };

    window.logout = () => signOut(auth);

    // 註冊與登入邏輯（簡略版）
    document.getElementById('loginBtn').onclick = () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        signInWithEmailAndPassword(auth, e, p).catch(err => alert("身分驗證失敗"));
    };
</script>
</body>
</html>
